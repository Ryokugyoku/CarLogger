name: cross-platform release
on: [workflow_dispatch]
jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: [self-hosted, linux, ARM64, raspberry-pi-5]
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}", components: rustfmt,clippy }
      - uses: actions/setup-python@v5
        with: { python-version: 3.11.9 }
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings
      - run: cargo test --workspace --target ${{ matrix.target }}
      - run: python -m pip install -e './python/ai_worker[dev]'
      - run: ruff check python/ai_worker && ruff format --check python/ai_worker
      - run: pytest python/ai_worker
      - shell: bash
        run: TARGET_TRIPLE=${{ matrix.target }} PYTHON_BIN=python distribution/build-runtime.sh
      - uses: actions/upload-artifact@v4
        with: { name: "CarLogger-${{ matrix.target }}", path: "dist/${{ matrix.target }}" }
