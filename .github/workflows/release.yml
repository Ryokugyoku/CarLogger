name: preview release

on:
  push:
    branches: [staging]
    paths:
      - 'apps/**'
      - 'crates/**'
      - 'python/**'
      - 'distribution/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apex-trace-preview-release
  cancel-in-progress: false

jobs:
  version:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - id: version
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          latest=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --jq '[.[] | select(.draft == false and .prerelease == false) | .tag_name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0]' 2>/dev/null || true)
          if [[ -z "$latest" || "$latest" == null ]]; then latest="v$(sed -n 's/^version = "\([0-9.]*\)"/\1/p' Cargo.toml | head -1)"; fi
          IFS=. read -r major minor patch <<< "${latest#v}"
          version="$major.$minor.$((patch + 1))-preview.${GITHUB_RUN_NUMBER}"
          if git rev-parse "v$version" >/dev/null 2>&1; then echo "Version v$version already exists" >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  quality:
    needs: version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt,clippy }
      - run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libudev-dev libgettextpo-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - uses: actions/setup-python@v6
        with: { python-version: '3.11.9' }
      - run: python -m pip install -e './python/ai_worker[dev]'
      - run: ruff check python/ai_worker && ruff format --check python/ai_worker && pytest python/ai_worker

  build:
    needs: [version, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-gnu
            platform: windows-x64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos-x64
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: macos-arm64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - id: setup-python
        uses: actions/setup-python@v6
        with: { python-version: '3.11.9' }
      - name: Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libudev-dev libfuse2 gettext
      - name: macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install gtk4 gettext
      - name: Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y msys2
          C:\tools\msys64\usr\bin\bash.exe -lc 'pacman -S --noconfirm mingw-w64-x86_64-gtk4 mingw-w64-x86_64-gettext'
          "C:\tools\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "PKG_CONFIG_PATH=C:\tools\msys64\mingw64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Inject release version without a release commit
        shell: bash
        run: |
          sed -i.bak 's/^version = "[0-9][0-9.]*"/version = "${{ needs.version.outputs.version }}"/' Cargo.toml
          rm Cargo.toml.bak
          # Version injection changes every workspace package's lockfile entry.
          # Let Cargo synchronize only those root-package versions, then prove
          # the following build can run with --locked.
          cargo metadata --format-version 1 > /dev/null
          cargo metadata --format-version 1 --locked > /dev/null
      - name: Build runtime
        shell: bash
        env:
          TARGET_TRIPLE: '${{ matrix.target }}'
          PYTHON_BIN: '${{ steps.setup-python.outputs.python-path }}'
        run: distribution/build-runtime.sh
      - name: Optional Windows Authenticode signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: '${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}'
          WINDOWS_CERTIFICATE_PASSWORD: '${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}'
        run: distribution/sign-windows.ps1 "dist/${{ matrix.target }}/car-logger-gui.exe"
      - name: Optional macOS signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: '${{ secrets.APPLE_CERTIFICATE_BASE64 }}'
          APPLE_CERTIFICATE_PASSWORD: '${{ secrets.APPLE_CERTIFICATE_PASSWORD }}'
          APPLE_SIGNING_IDENTITY: '${{ secrets.APPLE_SIGNING_IDENTITY }}'
          APPLE_ID: '${{ secrets.APPLE_ID }}'
          APPLE_APP_PASSWORD: '${{ secrets.APPLE_APP_PASSWORD }}'
          APPLE_TEAM_ID: '${{ secrets.APPLE_TEAM_ID }}'
        run: distribution/sign-macos.sh "dist/${{ matrix.target }}/car-logger-gui"
      - name: Package and hash
        shell: bash
        env:
          VERSION: '${{ needs.version.outputs.version }}'
          TARGET_TRIPLE: '${{ matrix.target }}'
          PLATFORM: '${{ matrix.platform }}'
        run: distribution/package-release.sh
      - uses: actions/upload-artifact@v7
        with:
          name: 'APEX-TRACE-${{ matrix.platform }}'
          path: release-assets/*
          if-no-files-found: error

  approve-and-publish-preview:
    needs: [version, build]
    runs-on: ubuntu-24.04
    environment: preview-release
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v8
        with: { path: release-assets, merge-multiple: true }
      - name: Refuse duplicate publication
        env: { GH_TOKEN: '${{ github.token }}' }
        run: '! gh release view "${{ needs.version.outputs.tag }}" >/dev/null 2>&1'
      - name: Generate Japanese release notes
        env: { GH_TOKEN: '${{ github.token }}' }
        run: distribution/generate-release-notes.sh "${{ needs.version.outputs.tag }}" > RELEASE_NOTES.md
      - name: Create immutable preview release
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          git tag "${{ needs.version.outputs.tag }}" "$GITHUB_SHA"
          git push origin "${{ needs.version.outputs.tag }}"
          gh release create "${{ needs.version.outputs.tag }}" release-assets/* --title "APEX//TRACE Preview ${{ needs.version.outputs.tag }}" --notes-file RELEASE_NOTES.md --verify-tag --prerelease
